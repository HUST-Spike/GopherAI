services:
  mysql:
    image: mysql:8.0
    container_name: gopherai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "GopherAI"
    ports:
      - "4306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - gopherai-mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: gopherai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - gopherai-redis-data:/data
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gopherai-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "root"
      RABBITMQ_DEFAULT_PASS: "123456"
      RABBITMQ_DEFAULT_VHOST: "/"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - gopherai-rabbitmq-data:/var/lib/rabbitmq

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: gopherai-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: "revision"
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - gopherai-milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: gopherai-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    volumes:
      - gopherai-milvus-minio-data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.2
    container_name: gopherai-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "milvus-etcd:2379"
      MINIO_ADDRESS: "milvus-minio:9000"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - gopherai-milvus-data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  attu:
    image: zilliz/attu:v2.6.5
    container_name: gopherai-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: "milvus:19530"
    ports:
      - "8000:3000"
    depends_on:
      milvus:
        condition: service_healthy

volumes:
  gopherai-mysql-data:
  gopherai-redis-data:
  gopherai-rabbitmq-data:
  gopherai-milvus-etcd-data:
  gopherai-milvus-minio-data:
  gopherai-milvus-data:
